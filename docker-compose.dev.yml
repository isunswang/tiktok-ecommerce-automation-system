version: "3.9"

# 开发环境覆盖配置 - 启用热重载和调试端口
# 使用: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tiktok_ops_backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - backend_cache:/root/.cache
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-tiktok_ops}:${POSTGRES_PASSWORD:-tiktok_ops_dev}@postgres:5432/${POSTGRES_DB:-tiktok_ops}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=http://minio:9000
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-tiktok_ops}:${RABBITMQ_PASSWORD:-tiktok_ops_dev}@rabbitmq:5672/
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: tiktok_ops_agent
    ports:
      - "${AGENT_PORT:-8001}:8001"
    volumes:
      - ./agent:/app
    environment:
      - BACKEND_API_URL=http://backend:8000/api/v1
      - REDIS_URL=redis://redis:6379/1
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    depends_on:
      - backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  scraper-worker:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: tiktok_ops_scraper
    volumes:
      - ./scraper:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-tiktok_ops}:${POSTGRES_PASSWORD:-tiktok_ops_dev}@postgres:5432/${POSTGRES_DB:-tiktok_ops}
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-tiktok_ops}:${RABBITMQ_PASSWORD:-tiktok_ops_dev}@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: celery -A scraper.tasks worker --loglevel=info

  frontend:
    image: node:20-alpine
    container_name: tiktok_ops_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    working_dir: /app
    environment:
      - VITE_API_BASE_URL=http://localhost:${BACKEND_PORT:-8000}/api/v1
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"

volumes:
  backend_cache:
  frontend_node_modules:
